workflows:
  ios-release:
    name: iOS Release (unsigned)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          cd frontend
          flutter pub get
      - name: Build IPA release sin firma
        script: |
          cd frontend
          flutter build ipa --release --no-codesign
          # Empaquetar .app del xcarchive como .ipa unsigned para Sideloadly
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r CortexAI.ipa Payload
          rm -rf Payload
    artifacts:
      - frontend/build/ios/ipa/CortexAI.ipa
