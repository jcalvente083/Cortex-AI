workflows:
  ios-release:
    name: iOS Release (unsigned)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          cd frontend
          flutter pub get
      - name: Build IPA release sin firma
        script: |
          cd frontend
          flutter build ipa --release --no-codesign
    artifacts:
      - frontend/build/ios/ipa/*.ipa
